<svg viewBox="0 0 680 555" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="Helvetica, Arial, sans-serif">
  <title id="ttl">Klinische Populationen von AN-Sprechstunde und POPS</title>
  <desc id="desc">Zwei überlappende Kreise mit kleiner, unbeschrifteter Schnittmenge. Links die AN-Sprechstunde als CHOP-basierte Pilot-Population mit Fokus Patient Blood Management in Ortho und Neurochirurgie. Rechts POPS, das elektive Hochrisikopatienten aller Fachdisziplinen herausfischt, aufarbeitet und vorstellt. Ein Pfeil oben zeigt die Solo-POPS-Übergabe von AN zu POPS, ein Pfeil unten die Zuweisung von POPS zur AN-Sprechstunde.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" font-size="17" font-weight="600" fill="#1f3b4d">AN-Sprechstunde und POPS</text>
  <text x="340" y="52" text-anchor="middle" font-size="12.5" fill="#5a6b78">überlappende und je eigene Populationen</text>

  <path d="M240 102 C 315 84, 365 84, 460 102" fill="none" stroke="#5a6b78" stroke-width="1.6" opacity="0.75" marker-end="url(#arrow)"/>
  <text x="340" y="76" text-anchor="middle" font-size="11.5" fill="#5a6b78">AN → POPS: Solo-POPS-Übergabe</text>

  <circle cx="210" cy="300" r="160" fill="#37607C" fill-opacity="0.12" stroke="#37607C" stroke-opacity="0.55" stroke-width="2"/>
  <circle cx="470" cy="300" r="160" fill="#4e8a5a" fill-opacity="0.12" stroke="#4e8a5a" stroke-opacity="0.55" stroke-width="2"/>

  <text x="180" y="272" text-anchor="middle" font-size="15" font-weight="600" fill="#37607C">AN-Sprechstunde</text>
  <text x="180" y="294" text-anchor="middle" font-size="11.5" fill="#33424c">CHOP-basierte Pilot-Population</text>
  <text x="180" y="311" text-anchor="middle" font-size="11.5" fill="#33424c">Fokus Patient Blood Management</text>
  <text x="180" y="328" text-anchor="middle" font-size="11.5" fill="#33424c">Ortho und Neurochirurgie</text>

  <text x="500" y="266" text-anchor="middle" font-size="15" font-weight="600" fill="#4e8a5a">POPS</text>
  <text x="500" y="288" text-anchor="middle" font-size="11.5" fill="#33424c">elektive Hochrisikopatienten</text>
  <text x="500" y="305" text-anchor="middle" font-size="11.5" fill="#33424c">aller Fachdisziplinen</text>
  <text x="500" y="322" text-anchor="middle" font-size="11.5" fill="#33424c">herausfischen, aufarbeiten,</text>
  <text x="500" y="339" text-anchor="middle" font-size="11.5" fill="#33424c">vorstellen</text>

  <path d="M460 498 C 365 516, 315 516, 240 498" fill="none" stroke="#5a6b78" stroke-width="1.6" opacity="0.75" marker-end="url(#arrow)"/>
  <text x="340" y="540" text-anchor="middle" font-size="11.5" fill="#5a6b78">POPS → AN: Zuweisung zur AN-Sprechstunde</text>
</svg>
